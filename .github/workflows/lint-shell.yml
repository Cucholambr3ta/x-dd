name: Lint Shell

on:
  push:
    branches: [main]
    paths:
      - '**.sh'
      - 'scripts/hooks/**'
      - '.github/workflows/lint-shell.yml'
  pull_request:
    paths:
      - '**.sh'
      - 'scripts/hooks/**'
      - '.github/workflows/lint-shell.yml'

permissions:
  contents: read

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@2.0.0
        env:
          SHELLCHECK_OPTS: -e SC1091 -e SC2034
        with:
          severity: warning
          scandir: '.'
          ignore_paths: 'node_modules .git'
