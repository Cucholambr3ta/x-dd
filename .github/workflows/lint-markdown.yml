name: Lint Markdown

on:
  push:
    branches: [main]
    paths:
      - '**.md'
      - '.github/workflows/lint-markdown.yml'
      - '.markdownlint.yaml'
  pull_request:
    paths:
      - '**.md'
      - '.github/workflows/lint-markdown.yml'
      - '.markdownlint.yaml'

permissions:
  contents: read

jobs:
  markdownlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Lint Markdown
        uses: DavidAnson/markdownlint-cli2-action@v16
        with:
          globs: |
            **/*.md
            !node_modules/**
            !.git/**
